window.TONE_MAP = {
  'a': ['ā','á','ǎ','à','a'],'o': ['ō','ó','ǒ','ò','o'],'e': ['ē','é','ě','è','e'],
  'i': ['ī','í','ǐ','ì','i'],'u': ['ū','ú','ǔ','ù','u'],'v': ['ǖ','ǘ','ǚ','ǜ','ü'],

// 把拼音+声调数字 → 真正的带调拼音（如 "duan" + 1 → "duān"）
window.toTonedPinyin = function(pinyin, tone) {
  if (!pinyin || !tone || tone < 1 || tone > 4) return pinyin || '';
  const p = pinyin.toLowerCase();
  // 找带调韵母（优先匹配长的）
  const finals = ['iang','iong','uang','ueng','iang','iang','iang','ai','ei','ui','ao','ou','iu','ie','ve','er','an','en','in','un','vn','ang','eng','ing','ong','a','o','e','i','u','v','n','g'];
  for (const f of finals) {
    if (p.includes(f)) {
      const tones = window.TONE_MAP[f];
      if (tones) {
        const toned = tones[tone - 1];
        return p.replace(f, toned);
      }
    }
  }
  return pinyin;
};

window.getPinyinRaw = function(char) { return window.PINYIN_DATA[char] || null; };

<script>
// ===== TTS 引擎 =====
class HuaXiaTTS {
  constructor() {
    this.synth = window.speechSynthesis;
    this.voice = null; this.ready = false; this.onReadyCallbacks = [];
    this.statusEl = document.getElementById('tts-status');
    this._init();
  }
  _init() {
    const load = () => {
      const voices = this.synth.getVoices();
      if (!voices.length) return false;
      this.voice = voices.find(v => /zh/i.test(v.lang) && /Xiaoxiao|Mei|Ting|女|female/i.test(v.name))
                 || voices.find(v => /zh/i.test(v.lang));
      this.ready = !!this.voice;
      if (this.ready) { this.onReadyCallbacks.forEach(cb => cb()); this.onReadyCallbacks = []; }
      return this.ready;
    };
    if (!load()) {
      this.synth.addEventListener('voiceschanged', load);
      let n = 0; const t = setInterval(() => { if (load() || ++n > 20) clearInterval(t); }, 200);
    }
  }
  onReady(cb) { this.ready ? cb() : this.onReadyCallbacks.push(cb); }
  speak(text, options = {}) {
    if (!text) return;
    if (!this.ready) { this.onReady(() => this._speakNow(text, options)); return; }
    this._speakNow(text, options);
  }
  _speakNow(text, options = {}) {
    this.synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.voice = this.voice; u.lang = this.voice.lang || 'zh-CN'; u.rate = options.rate ?? 0.85;
    if (this.statusEl) this.statusEl.style.display = 'block';
    u.onend = u.onerror = () => { if (this.statusEl) this.statusEl.style.display = 'none'; if (options.onEnd) options.onEnd(); };
    this.synth.speak(u);
  }
  stop() { this.synth.cancel(); if (this.statusEl) this.statusEl.style.display = 'none'; }
}

// ===== 田字格（用 ruby 标签，浏览器原生渲染）=====
class TianZiGe {
  constructor(char, pinyin = '') {
    this.char = char; this.pinyin = pinyin;
  }
  render(container) {
    const word = document.createElement('div');
    word.className = 'tianzige-word';
    word.title = '点我读：' + this.char;

    // 用 ruby 标签（浏览器原生拼音标注，零偏移）
    if (this.pinyin) {
      const ruby = document.createElement('ruby');
      ruby.textContent = this.char;
      const rt = document.createElement('rt');
      rt.textContent = this.pinyin;
      ruby.appendChild(rt);
      word.appendChild(ruby);
    } else {
      const span = document.createElement('span');
      span.textContent = this.char;
      word.appendChild(span);
    }

    const cell = document.createElement('div');
    cell.className = 'tianzige-cell';
    cell.textContent = this.char;
    word.appendChild(cell);

    word.onclick = e => {
      e.stopPropagation();
      cell.classList.add('highlight');
      setTimeout(() => cell.classList.remove('highlight'), 600);
      window.tts.speak(this.char);
    };
    container.appendChild(word);
    return word;
  }
}

// ===== 拼音行 =====
class PinyinLine {
  constructor(text) {
    this.text = text;
    this.words = this._build();
  }
  _build() {
    const words = [];
    for (const ch of this.text) {
      if (/[\u4e00-\u9fa5]/.test(ch)) {
        const pinyinRaw = window.getPinyinRaw(ch);
        // 拼音转带调（如 "duan" + 1 → "duān"）
        const tonedPinyin = pinyinRaw ? window.toTonedPinyin(pinyinRaw, this._guessTone(ch, pinyinRaw)) : '';
        words.push({ char: ch, pinyin: tonedPinyin });
      } else if (/[\s，。！？、；：""''《》（）]/.test(ch)) {
        words.push({ char: ch, isPunct: true });
      }
    }
    return words;
  }
  // 简化版：给常用字标声调（实际查表更准）
  _guessTone(char, pinyin) {
    const toneMap = {
      '的':5,'了':5,'着':5,'过':5,'们':5,'子':5,'儿':5,
      '我':3,'你':3,'他':1,'她':1,'它':1,'们':5,
      '是':4,'在':4,'有':3,'的':5,'和':2,'也':3,'就':4,'都':1,
      '一':1,'二':4,'三':1,'四':4,'五':3,'六':4,'七':1,'八':1,'九':3,'十':2,
      '不':4,'了':5,'会':4,'能':2,'好':3,'看':4,'听':1,'说':1,
      '小':3,'朋':2,'友':3,'你':3,'知':1,'道':4,'吗':0,
      '端':1,'午':3,'节':2,'粽':4,'舟':1,'屈':1,'原':2,'龙':2,
      '春':1,'年':2,'兽':4,'爆':4,'福':2,'饺':3,
      '秋':1,'月':4,'饼':3,'团':2,'圆':2,'嫦':2,'兔':4,
      '宵':1,'灯':1,'谜':2,'汤':1,'舞':3,
      '清':1,'明':2,'雨':3,'花':1,'柳':3,'魂':2,'扫':3,'墓':4,
      '每':3,'农':2,'历':4,
      '这':4,'天':1,'大':4,'人':2,'会':4,'包':1,
      '赛':4,'挂':4,'艾':4,'草':3,'可':3,'热':4,'闹':4,'啦':0,
      '爱':4, '美':3, '丽':4, '梦':4, '想':3, '希':1, '望':4
    };
    return toneMap[char] || 1;
  }
  render(container) {
    const line = document.createElement('div');
    line.className = 'pinyin-line';
    for (const w of this.words) {
      if (w.isPunct) {
        const span = document.createElement('span');
        span.className = 'punct';
        span.textContent = w.char;
        line.appendChild(span);
      } else {
        new TianZiGe(w.char, w.pinyin).render(line);
      }
    }
    container.appendChild(line);
    return line;
  }
}

      </div>
    `;

    ov.onclick = e => { if (e.target === ov) ov.remove(); };

          configOverwrite: { startWithAudioMuted: !isMod, prejoinPageEnabled: false }
        });

class ArticleRenderer {
  constructor(article) { this.article = article; }
  render(id) {
    const c = document.getElementById(id);
    c.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'reader-header';
    header.innerHTML = `<button class="back-btn" id="r-back">← 返回</button><h1>${this.article.title}</h1><button class="play-all-btn" id="play-all">🔊 朗读</button>`;
    c.appendChild(header);
    const main = document.createElement('div');
    main.className = 'article-main';
    const cover = document.createElement('div');
    cover.className = 'block block-image';
    cover.style.cssText = 'text-align:center;background:linear-gradient(135deg, #ffeaa7, #fab1a0);border-radius:14px;padding:30px;margin-bottom:20px;';
    cover.innerHTML = `<div style="font-size:100px;">${this.article.coverIcon || '📖'}</div>
      <div style="font-size:20px;color:#c0392b;font-weight:bold;margin-top:10px;">${this.article.title}</div>
      <div style="color:#666;margin-top:6px;">— ${this.article.subtitle || ''} —</div>`;
    main.appendChild(cover);
    (this.article.content || []).forEach(b => this._render(b, main));
    c.appendChild(main);
    const footer = document.createElement('div');
    footer.className = 'article-footer';
    footer.innerHTML = `版本 v${this.article.version || '1.0.0'}<br>🌟 华夏小课堂`;
    c.appendChild(footer);
    document.getElementById('r-back').onclick = () => window.app.renderCategory(window.app.currentCategory);
    document.getElementById('play-all').onclick = () => this._playAll();
  }
  _render(block, parent) {
    const div = document.createElement('div');
    div.className = `block block-${block.type}`;
    div.dataset.text = block.text || block.content || '';

    if (block.type === 'paragraph' || block.type === 'story') {
      new PinyinLine(block.text).render(div);
      div.onclick = () => window.tts.speak(block.text);
    }
    else if (block.type === 'dialogue') {
      div.style.cssText = 'background:#e3f2fd;border-left:4px solid #2196f3;border-radius:14px;padding:18px;margin:16px 0;cursor:pointer;';
      div.innerHTML = `<strong style="color:#1976d2;font-size:18px;">💬 ${block.speaker}：</strong>`;
      new PinyinLine(block.text).render(div);
      div.onclick = () => window.tts.speak(block.text);
    }
    else if (block.type === 'image') {
      div.classList.add('block-image');
      div.innerHTML = `<div style="font-size:100px;">${block.icon || '🎨'}</div>
        <div style="color:#666;font-style:italic;margin-top:8px;">${block.caption || ''}</div>`;
    }
    else if (block.type === 'knowledge') {
      div.style.cssText = 'background:#fff3e0;border-left:4px solid #ff9800;border-radius:14px;padding:18px;margin:16px 0;cursor:pointer;';
      const h = document.createElement('h3'); h.style.cssText = 'color:#e65100;margin:0 0 12px;'; h.textContent = block.title || '📚 文化小知识';
      div.appendChild(h);
      const ul = document.createElement('ul'); ul.style.cssText = 'margin:0;padding-left:20px;';
      (block.items || []).forEach(it => { const li = document.createElement('li'); li.style.cssText = 'margin:8px 0;line-height:1.7;'; li.textContent = it; ul.appendChild(li); });
      div.appendChild(ul);
      div.onclick = () => window.tts.speak((block.items || []).join('。'));
    }
    else if (block.type === 'poem') {
      div.style.cssText = 'background:#f3e5f5;border-left:4px solid #9c27b0;border-radius:14px;padding:20px;margin:16px 0;cursor:pointer;';
      const h = document.createElement('h3'); h.style.cssText = 'color:#6a1b9a;margin:0 0 16px;'; h.textContent = '📜 ' + (block.title || '古诗欣赏');
      div.appendChild(h);
      const pre = document.createElement('div'); pre.className = 'poem-content'; pre.textContent = block.content; div.appendChild(pre);
      if (block.author) { const a = document.createElement('div'); a.className = 'poem-author'; a.textContent = '—— ' + block.author; div.appendChild(a); }
      div.onclick = () => window.tts.speak(block.content.replace(/\n/g, '。'));
    }
    else if (block.type === 'vocabulary') {
      // ✨ 生字区：直接用 JSON 里的拼音（不再二次加工）
      div.className = 'block block-vocabulary';
      div.style.cssText = 'background:#e8f5e9;border-left:4px solid #4caf50;border-radius:14px;padding:20px;margin:16px 0;';
      const h = document.createElement('h3'); h.style.cssText = 'color:#2e7d32;margin:0 0 16px;cursor:pointer;'; h.textContent = '✏️ ' + (block.title || '生字乐园');
      div.appendChild(h);
      const grid = document.createElement('div'); grid.className = 'vocab-grid';
      (block.words || []).forEach(w => {
        // 如果 JSON 里有 pinyin + tone，转成带调拼音；否则只显示汉字
        let displayPinyin = w.pinyin || '';
        if (w.pinyin && w.tone) {
          displayPinyin = window.toTonedPinyin(w.pinyin, w.tone);
        }
        new TianZiGe(w.char, displayPinyin).render(grid);
      });
      div.appendChild(grid);
      h.onclick = e => { e.stopPropagation(); window.tts.speak((block.words || []).map(w => w.char).join('')); };
    }
    else if (block.type === 'question') {
      div.style.cssText = 'background:#fffde7;border-left:4px solid #fbc02d;border-radius:14px;padding:18px;margin:16px 0;cursor:pointer;';
      const s = document.createElement('strong'); s.style.cssText = 'color:#f57f17;display:block;margin-bottom:8px;'; s.textContent = '🤔 想一想：';
      div.appendChild(s);
      const p = document.createElement('p'); p.style.cssText = 'font-size:18px;margin:0;color:#5d4037;'; p.textContent = block.text; div.appendChild(p);
      div.onclick = () => window.tts.speak(block.text);
    }
    parent.appendChild(div);
  }
  async _playAll() {
    window.tts.stop();
    const blocks = document.querySelectorAll('.article-main .block-paragraph, .article-main .block-story, .article-main .block-dialogue, .article-main .block-knowledge, .article-main .block-poem, .article-main .block-question');
    for (const b of blocks) {
      const text = b.dataset.text;
      if (!text) continue;
      b.style.background = '#fff9c4';
      b.scrollIntoView({ behavior: 'smooth', block: 'center' });
      await new Promise(r => window.tts.speak(text, { onEnd: r, rate: 0.85 }));
      b.style.background = '';
      await new Promise(r => setTimeout(r, 500));
    }
  }
}

window.tts = new HuaXiaTTS();
window.app = new HuaXiaApp();
window.app.init();
</script>
</body>
</html>
