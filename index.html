<script>
/* ============================================
   全部代码内嵌在 index.html 里！
   ✅ 不依赖任何外部 JS
   ✅ 拼音库内置
   ✅ 一打开就能用

// ===== TTS 引擎 =====
class HuaXiaTTS {
  constructor() {
    this.synth = window.speechSynthesis;
    this.voice = null;
    this.ready = false;
    this.onReadyCallbacks = [];
    this.statusEl = document.getElementById('tts-status');
    this._init();
  }
  _init() {
    const load = () => {
      const voices = this.synth.getVoices();
      if (voices.length === 0) return false;
      this.voice = voices.find(v => /zh/i.test(v.lang) && /Xiaoxiao|Mei|Ting|女|female/i.test(v.name))
                 || voices.find(v => /zh/i.test(v.lang));
      this.ready = !!this.voice;
      if (this.ready) {
        console.log('✅ TTS 就绪:', this.voice.name);
        this.onReadyCallbacks.forEach(cb => cb());
        this.onReadyCallbacks = [];
      }
      return this.ready;
    };
    if (!load()) {
      this.synth.addEventListener('voiceschanged', load);
      let n = 0;
      const t = setInterval(() => { if (load() || ++n > 20) clearInterval(t); }, 200);
    }
  }
  onReady(cb) { this.ready ? cb() : this.onReadyCallbacks.push(cb); }
  speak(text, options = {}) {
    if (!text) return;
    if (!this.ready) { this.onReady(() => this._speakNow(text, options)); return; }
    this._speakNow(text, options);
  }
  _speakNow(text, options = {}) {
    this.synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.voice = this.voice;
    u.lang = this.voice.lang || 'zh-CN';
    u.rate = options.rate ?? 0.85;
    if (this.statusEl) this.statusEl.style.display = 'block';
    u.onend = u.onerror = () => { if (this.statusEl) this.statusEl.style.display = 'none'; if (options.onEnd) options.onEnd(); };
    this.synth.speak(u);
  }
  stop() { this.synth.cancel(); if (this.statusEl) this.statusEl.style.display = 'none'; }
}

// ===== 田字格 =====
class TianZiGe {
  constructor(char, pinyin = '', tone = 0) {
    this.char = char; this.pinyin = pinyin; this.tone = tone;
  }
  render(container) {
    const word = document.createElement('div');
    word.className = 'tianzige-word';
    word.title = '点我读：' + this.char;

    const pinyinRow = document.createElement('div');
    pinyinRow.className = 'pinyin-row';
    if (this.pinyin) {
      const t = document.createElement('span');
      t.className = 'tone';
      t.textContent = this.pinyin;
      const marks = { 1: '¯', 2: '´', 3: 'ˇ', 4: '`', 5: '' };
      t.setAttribute('data-tone-mark', marks[this.tone] || '');
      pinyinRow.appendChild(t);
    } else {
      pinyinRow.innerHTML = '&nbsp;';
    }
    word.appendChild(pinyinRow);

    const cell = document.createElement('div');
    cell.className = 'tianzige-cell';
    cell.textContent = this.char;
    word.appendChild(cell);

    word.onclick = e => {
      e.stopPropagation();
      cell.classList.add('highlight');
      setTimeout(() => cell.classList.remove('highlight'), 600);
      window.tts.speak(this.char);
    };
    container.appendChild(word);
    return word;
  }
}

// ===== 拼音行 =====
class PinyinLine {
  constructor(text) {
    this.text = text;
    this.words = this._build();
  }
  _build() {
    const words = [];
    for (const ch of this.text) {
      if (/[\u4e00-\u9fa5]/.test(ch)) {
        const info = window.getPinyin(ch);
        words.push({ char: ch, pinyin: info ? info.p : '', tone: info ? info.t : 0 });
      } else if (/[\s，。！？、；：""''《》（）]/.test(ch)) {
        words.push({ char: ch, isPunct: true });
      }
    }
    return words;
  }
  render(container) {
    const line = document.createElement('div');
    line.className = 'pinyin-line';
    for (const w of this.words) {
      if (w.isPunct) {
        const span = document.createElement('span');
        span.className = 'punct';
        span.textContent = w.char;
        line.appendChild(span);
      } else {
        new TianZiGe(w.char, w.pinyin, w.tone).render(line);
      }
    }
    container.appendChild(line);
    return line;
  }
}

// ===== 主应用 =====
class HuaXiaApp {
  constructor() {
    this.currentCategory = null;
  }
  init() {
    console.log('🚀 华夏小课堂启动');
    this.renderHome();
  }
  renderHome() {
    document.getElementById('app').innerHTML = `
      <div class="home-header">
        <h1>🏮 华夏小课堂</h1>
        <p>读中国故事 · 传中华文化</p>
        <button class="welcome-btn" id="welcome-btn">🔊 点我听介绍</button>
      </div>
      <div class="quick-actions">
        <button class="qa-btn" onclick="app.openVideo()">📹 视频课堂</button>
      </div>
      <div class="categories" id="categories"></div>
      <footer style="text-align:center;padding:30px;color:#888;font-size:13px;">
        <p>🌟 华夏小课堂 · 让世界听见中国</p>
      </footer>
    `;
    document.getElementById('welcome-btn').onclick = () => {
      if (window.tts && window.tts.ready) {
        window.tts.speak('你好小朋友，欢迎来到华夏小课堂！');
      }
    };

    const categories = [
      { id: 'festivals',  name: '传统节日', icon: '🎊', color: '#e74c3c', desc: '春节·端午·中秋...' },
      { id: 'heroes',     name: '历史人物', icon: '🦸', color: '#3498db', desc: '孔子·屈原·花木兰...' },
      { id: 'idioms',     name: '成语故事', icon: '📖', color: '#16a085', desc: '守株待兔·狐假虎威...' },
      { id: 'poems',      name: '古诗欣赏', icon: '🖌️', color: '#9b59b6', desc: '唐诗三百首...' },
      { id: 'inventions', name: '四大发明', icon: '⚙️', color: '#f39c12', desc: '造纸·印刷·火药·指南针...' },
      { id: 'food',       name: '美食文化', icon: '🥟', color: '#e67e22', desc: '粽子·饺子·汤圆...' }
    ];

    const cc = document.getElementById('categories');
    categories.forEach(cat => {
      const card = document.createElement('div');
      card.className = 'category-card';
      card.style.background = cat.color;
      card.innerHTML = `<div class="icon">${cat.icon}</div><h3>${cat.name}</h3><p>${cat.desc}</p>`;
      card.onclick = () => this.renderCategory(cat);
      cc.appendChild(card);
    });
  }

  openVideo() {
    const overlay = document.createElement('div');
    overlay.className = 'vc-overlay';
    overlay.innerHTML = `
      <div class="vc-modal">
        <h2 style="color:#5e35b1;margin-bottom:16px;">📹 视频课堂</h2>
        <p style="color:#666;font-size:14px;margin-bottom:16px;">老师输入房间号 → 上课 → 把房间号发给学生</p>
        <input id="vc-room" placeholder="房间号（如：huaxia-2024）" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;">
        <input id="vc-name" placeholder="您的姓名" value="老师" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;">
        <button class="vc-btn vc-btn-primary" id="vc-start">🎥 开始上课</button>
        <button class="vc-btn vc-btn-success" id="vc-join">🎒 我是学生，输入房间号加入</button>
        <button class="vc-btn" style="background:#f0f0f0;color:#333;" id="vc-close">关闭</button>
      </div>
    `;
    document.body.appendChild(overlay);

    document.getElementById('vc-close').onclick = () => overlay.remove();
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

    document.getElementById('vc-start').onclick = () => {
      const room = document.getElementById('vc-room').value.trim();
      const name = document.getElementById('vc-name').value.trim() || '老师';
      if (!room) { alert('请输入房间号'); return; }
      this.launchJitsi(room, name, true);
      overlay.remove();
    };
    document.getElementById('vc-join').onclick = () => {
      const room = document.getElementById('vc-room').value.trim();
      if (!room) { alert('请输入房间号'); return; }
      this.launchJitsi(room, '学生', false);
      overlay.remove();
    };
  }

  launchJitsi(roomName, displayName, isModerator) {
    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#000;';
    container.innerHTML = `<div id="jitsi" style="width:100%;height:100%;"></div>
      <button id="vc-exit" style="position:absolute;top:20px;right:20px;background:#c62828;color:white;border:none;padding:10px 20px;border-radius:24px;cursor:pointer;font-weight:bold;z-index:100000;">✕ 退出</button>`;
    document.body.appendChild(container);

    const init = () => {
      try {
        const api = new JitsiMeetExternalAPI('meet.jit.si', {
          roomName, width: '100%', height: '100%',
          parentNode: document.getElementById('jitsi'),
          userInfo: { displayName, moderator: isModerator },
          configOverwrite: { startWithAudioMuted: !isModerator, prejoinPageEnabled: false }
        });
        api.addListener('readyToClose', () => container.remove());
        document.getElementById('vc-exit').onclick = () => { api.dispose(); container.remove(); };
      } catch (e) {
        alert('视频加载失败，请直接访问：https://meet.jit.si/' + roomName);
      }
    };

    if (window.JitsiMeetExternalAPI) init();
    else {
      const s = document.createElement('script');
      s.src = 'https://meet.jit.si/external_api.js';
      s.onload = init;
      s.onerror = () => alert('视频服务加载失败，请直接访问：\nhttps://meet.jit.si/' + roomName);
      document.head.appendChild(s);
    }
  }

  async renderCategory(category) {
    this.currentCategory = category;
    document.getElementById('app').innerHTML = `
      <div class="list-header" style="background:${category.color};">
        <button class="back-btn" id="back-btn">← 返回</button>
        <h2 style="color:white;">${category.icon} ${category.name}</h2>
        <span style="width:60px;"></span>
      </div>
      <div class="article-list" id="article-list">加载中...</div>
    `;
    document.getElementById('back-btn').onclick = () => this.renderHome();
    const articles = await this.loadIndex(category.id);
    const list = document.getElementById('article-list');
    if (!articles.length) { list.innerHTML = '<p style="text-align:center;color:#888;padding:40px;">该分类下还没有内容</p>'; return; }
    list.innerHTML = '';
    articles.forEach(a => {
      const card = document.createElement('div');
      card.className = 'article-item';
      card.innerHTML = `<div class="icon">${a.icon || '📄'}</div><div><h3>${a.title}</h3><p>${a.desc || '点击阅读 →'}</p></div>`;
      card.onclick = () => this.openArticle(category.id, a.id);
      list.appendChild(card);
    });
  }

  async loadIndex(cat) {
    try {
      const r = await fetch(`content/${cat}/index.json?_=${Date.now()}`);
      if (r.ok) return await r.json();
    } catch (e) {}
    return { festivals: [{ id: 'duanwu', title: '端午节', icon: '🐉', desc: '屈原与粽子' }] }[cat] || [];
  }

  async openArticle(cat, id) {
    try {
      const r = await fetch(`content/${cat}/${id}.json?_=${Date.now()}`);
      if (!r.ok) throw 0;
      const data = await r.json();
      document.getElementById('app').innerHTML = '<div id="reader"></div>';
      new ArticleRenderer(data).render('reader');
    } catch (e) {
      alert('加载失败');
    }
  }
}

// ===== 文章渲染器 =====
class ArticleRenderer {
  constructor(article) { this.article = article; }

  render(containerId) {
    const c = document.getElementById(containerId);
    c.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'reader-header';
    header.innerHTML = `<button class="back-btn" id="r-back">← 返回</button><h1>${this.article.title}</h1><button class="play-all-btn" id="play-all">🔊 朗读</button>`;
    c.appendChild(header);

    const main = document.createElement('div');
    main.className = 'article-main';

    const cover = document.createElement('div');
    cover.className = 'block block-image';
    cover.style.cssText = 'text-align:center;background:linear-gradient(135deg, #ffeaa7, #fab1a0);border-radius:14px;padding:30px;margin-bottom:20px;';
    cover.innerHTML = `<div style="font-size:100px;">${this.article.coverIcon || '📖'}</div>
      <div style="font-size:20px;color:#c0392b;font-weight:bold;margin-top:10px;">${this.article.title}</div>
      <div style="color:#666;margin-top:6px;">— ${this.article.subtitle || ''} —</div>`;
    main.appendChild(cover);

    (this.article.content || []).forEach(b => this._render(b, main));
    c.appendChild(main);

    const footer = document.createElement('div');
    footer.className = 'article-footer';
    footer.innerHTML = `版本 v${this.article.version || '1.0.0'} · 更新于 ${this.article.lastUpdated || ''}<br>🌟 华夏小课堂`;
    c.appendChild(footer);

    document.getElementById('r-back').onclick = () => window.app.renderCategory(window.app.currentCategory);
    document.getElementById('play-all').onclick = () => this._playAll();
  }

  _render(block, parent) {
    const div = document.createElement('div');
    div.className = `block block-${block.type}`;
    div.dataset.text = block.text || block.content || '';

    if (block.type === 'paragraph' || block.type === 'story') {
      new PinyinLine(block.text).render(div);
      div.onclick = () => window.tts.speak(block.text);
    }
    else if (block.type === 'dialogue') {
      div.style.cssText = 'background:#e3f2fd;border-left:4px solid #2196f3;border-radius:14px;padding:18px;margin:16px 0;cursor:pointer;';
      div.innerHTML = `<strong style="color:#1976d2;font-size:18px;">💬 ${block.speaker}：</strong>`;
      new PinyinLine(block.text).render(div);
      div.onclick = () => window.tts.speak(block.text);
    }
    else if (block.type === 'image') {
      div.classList.add('block-image');
      div.innerHTML = `<div style="font-size:100px;">${block.icon || '🎨'}</div>
        <div style="color:#666;font-style:italic;margin-top:8px;">${block.caption || ''}</div>`;
    }
    else if (block.type === 'knowledge') {
      div.style.cssText = 'background:#fff3e0;border-left:4px solid #ff9800;border-radius:14px;padding:18px;margin:16px 0;cursor:pointer;';
      const h = document.createElement('h3');
      h.style.cssText = 'color:#e65100;margin:0 0 12px;';
      h.textContent = block.title || '📚 文化小知识';
      div.appendChild(h);
      const ul = document.createElement('ul');
      ul.style.cssText = 'margin:0;padding-left:20px;';
      (block.items || []).forEach(it => {
        const li = document.createElement('li');
        li.style.cssText = 'margin:8px 0;line-height:1.7;';
        li.textContent = it;
        ul.appendChild(li);
      });
      div.appendChild(ul);
      div.onclick = () => window.tts.speak((block.items || []).join('。'));
    }
    else if (block.type === 'poem') {
      div.style.cssText = 'background:#f3e5f5;border-left:4px solid #9c27b0;border-radius:14px;padding:20px;margin:16px 0;cursor:pointer;';
      const h = document.createElement('h3');
      h.style.cssText = 'color:#6a1b9a;margin:0 0 16px;';
      h.textContent = '📜 ' + (block.title || '古诗欣赏');
      div.appendChild(h);
      const pre = document.createElement('div');
      pre.className = 'poem-content';
      pre.textContent = block.content;
      div.appendChild(pre);
      if (block.author) {
        const a = document.createElement('div');
        a.className = 'poem-author';
        a.textContent = '—— ' + block.author;
        div.appendChild(a);
      }
      div.onclick = () => window.tts.speak(block.content.replace(/\n/g, '。'));
    }
    else if (block.type === 'vocabulary') {
      div.className = 'block block-vocabulary';
      div.style.cssText = 'background:#e8f5e9;border-left:4px solid #4caf50;border-radius:14px;padding:20px;margin:16px 0;';
      const h = document.createElement('h3');
      h.style.cssText = 'color:#2e7d32;margin:0 0 16px;cursor:pointer;';
      h.textContent = '✏️ ' + (block.title || '生字乐园');
      div.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'vocab-grid';
      (block.words || []).forEach(w => new TianZiGe(w.char, w.pinyin, w.tone).render(grid));
      div.appendChild(grid);
      h.onclick = e => { e.stopPropagation(); window.tts.speak((block.words || []).map(w => w.char).join('')); };
    }
    else if (block.type === 'question') {
      div.style.cssText = 'background:#fffde7;border-left:4px solid #fbc02d;border-radius:14px;padding:18px;margin:16px 0;cursor:pointer;';
      const s = document.createElement('strong');
      s.style.cssText = 'color:#f57f17;display:block;margin-bottom:8px;';
      s.textContent = '🤔 想一想：';
      div.appendChild(s);
      const p = document.createElement('p');
      p.style.cssText = 'font-size:18px;margin:0;color:#5d4037;';
      p.textContent = block.text;
      div.appendChild(p);
      div.onclick = () => window.tts.speak(block.text);
    }
    parent.appendChild(div);
  }

  async _playAll() {
    window.tts.stop();
    const blocks = document.querySelectorAll('.article-main .block-paragraph, .article-main .block-story, .article-main .block-dialogue, .article-main .block-knowledge, .article-main .block-poem, .article-main .block-question');
    for (const b of blocks) {
      const text = b.dataset.text;
      if (!text) continue;
      b.style.background = '#fff9c4';
      b.scrollIntoView({ behavior: 'smooth', block: 'center' });
      await new Promise(r => window.tts.speak(text, { onEnd: r, rate: 0.85 }));
      b.style.background = '';
      await new Promise(r => setTimeout(r, 500));
    }
  }
}

// ===== 启动 =====
window.tts = new HuaXiaTTS();
window.app = new HuaXiaApp();
window.app.init();
</script>
