<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>教师后台 · 华夏小课堂</title>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.0/dist/index.js"></script>
<style>
/* （CSS 跟之前一样，省略，复用） */
</style>
</head>
<body>

<header>
  <h1>👩‍🏫 华夏小课堂 · 教师后台</h1>
  <div class="actions">
    <button onclick="window.open('../index.html','_blank')">👀 学生端</button>
    <button onclick="exportJSON()">💾 导出JSON</button>
    <button class="success" onclick="publishToGithub()">🚀 发布</button>
    <button class="primary" onclick="openVisitorPanel()">📊 访问记录</button>
    <button class="primary" onclick="openChatPanel()">💬 聊天记录</button>
  </div>
</header>

<!-- 访问记录面板 -->
<div id="visitor-panel" style="display:none;padding:20px;">
  <h2 style="color:#5e35b1;">📊 访问记录</h2>
  <p style="color:#666;font-size:13px;">从您的 GitHub 私有仓库 <code>hx-visitor-data</code> 读取所有访客的 IP 和位置。</p>
  <button class="btn btn-primary" onclick="loadVisitors()">🔄 加载记录</button>
  <button class="btn btn-success" onclick="exportVisitorsCSV()">📥 导出 CSV</button>
  <div id="visitor-list" style="margin-top:16px;"></div>
</div>

<!-- 聊天记录面板 -->
<div id="chat-panel" style="display:none;padding:20px;">
  <h2 style="color:#5e35b1;">💬 聊天记录</h2>
  <input id="admin-chat-room" placeholder="输入房间号查看" style="width:100%;padding:10px;margin:8px 0;">
  <button class="btn btn-primary" onclick="loadChatMessages()">🔄 加载消息</button>
  <div id="chat-list" style="margin-top:16px;"></div>
</div>

<!-- 编辑器 -->
<div id="editor-area">
  <!-- 之前的编辑器代码 -->
</div>

<script>
function openVisitorPanel() {
  document.getElementById('editor-area').style.display = 'none';
  document.getElementById('chat-panel').style.display = 'none';
  document.getElementById('visitor-panel').style.display = 'block';
}
function openChatPanel() {
  document.getElementById('editor-area').style.display = 'none';
  document.getElementById('visitor-panel').style.display = 'none';
  document.getElementById('chat-panel').style.display = 'block';
}

async function loadVisitors() {
  const cfg = JSON.parse(localStorage.getItem('hx_gh_config') || '{}');
  if (!cfg.user || !cfg.token || !cfg.visitRepo) {
    alert('请先在学生端「⚙️ 配置」里填 GitHub 信息');
    return;
  }
  const list = document.getElementById('visitor-list');
  list.innerHTML = '加载中...';
  try {
    const v = new GitHubVisitor(cfg.user, cfg.token, cfg.visitRepo);
    const records = await v.getAll();
    if (records.length === 0) {
      list.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">还没有访问记录</p>';
      return;
    }
    list.innerHTML = `
      <p style="color:#666;font-size:13px;">共 <strong>${records.length}</strong> 条记录</p>
      <table style="width:100%;border-collapse:collapse;margin-top:10px;font-size:13px;">
        <tr style="background:#7e57c2;color:white;">
          <th style="padding:8px;text-align:left;">时间</th>
          <th style="padding:8px;text-align:left;">IP</th>
          <th style="padding:8px;text-align:left;">位置</th>
          <th style="padding:8px;text-align:left;">UA</th>
        </tr>
        ${records.map(r => `<tr style="border-bottom:1px solid #eee;">
          <td style="padding:8px;">${r.time}</td>
          <td style="padding:8px;">${r.ip}</td>
          <td style="padding:8px;">${r.country}${r.region ? '·' + r.region : ''}${r.city ? '·' + r.city : ''}</td>
          <td style="padding:8px;font-size:11px;color:#888;">${(r.ua || '').substring(0, 40)}</td>
        </tr>`).join('')}
      </table>
    `;
  } catch (e) {
    list.innerHTML = '<p style="color:#c62828;">加载失败：' + e.message + '</p>';
  }
}

function exportVisitorsCSV() {
  alert('请先用「加载记录」加载，然后复制表格内容到 Excel');
  // 也可以扩展为导出 CSV
}

async function loadChatMessages() {
  const cfg = JSON.parse(localStorage.getItem('hx_gh_config') || '{}');
  const room = document.getElementById('admin-chat-room').value.trim();
  if (!cfg.user || !cfg.token || !cfg.chatRepo) return alert('请先配置');
  if (!room) return alert('请输入房间号');
  const list = document.getElementById('chat-list');
  list.innerHTML = '加载中...';
  try {
    const c = new GitHubChat(cfg.user, cfg.token, cfg.chatRepo);
    const msgs = await c.getMessages(room);
    if (msgs.length === 0) {
      list.innerHTML = '<p style="color:#888;">还没有消息</p>';
      return;
    }
    list.innerHTML = msgs.map(m => `
      <div style="padding:10px;margin:8px 0;background:#f5f5f5;border-radius:8px;">
        <div style="font-size:12px;color:#888;">${m.country} ${m.from} · ${new Date(m.time).toLocaleString('zh-CN')}</div>
        <div style="margin-top:6px;">${m.text}</div>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = '<p style="color:#c62820;">加载失败：' + e.message + '</p>';
  }
}

// GitHubChat / GitHubVisitor 类（跟 index.html 一样）
class GitHubChat {
  constructor(user, token, repo) { this.user = user; this.token = token; this.repo = repo; }
  get base() { return `https://api.github.com/repos/${this.user}/${this.repo}`; }
  headers() { return { 'Authorization': `token ${this.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }; }
  async getRoomIssue(roomId) {
    const r = await fetch(`${this.base}/issues?labels=chat-room&state=open&per_page=100`, { headers: this.headers() });
    if (!r.ok) throw new Error('获取房间失败：' + r.status);
    const issues = await r.json();
    let issue = issues.find(i => i.title === `[Chat] ${roomId}`);
    if (!issue) throw new Error('房间不存在');
    return issue;
  }
  async getMessages(roomId) {
    const issue = await this.getRoomIssue(roomId);
    const r = await fetch(`${this.base}/issues/${issue.number}/comments?per_page=100`, { headers: this.headers() });
    if (!r.ok) throw new Error('读取失败');
    const comments = await r.json();
    return comments.map(c => {
      const m = c.body.match(/^\*\*([\u{1F000}-\u{1FFFF}\u{1F300}-\u{1F9FF}]*?)\s*([^*]+?)\*\*\s*·\s*([\s\S]*?)\n\n([\s\S]*)$/u);
      if (m) return { id: c.id, from: m[2].trim(), country: m[1].trim(), time: c.created_at, text: m[4] };
      return { id: c.id, from: c.user.login, country: '🌏', time: c.created_at, text: c.body };
    });
  }
}

class GitHubVisitor {
  constructor(user, token, repo) { this.user = user; this.token = token; this.repo = repo; }
  get base() { return `https://api.github.com/repos/${this.user}/${this.repo}`; }
  headers() { return { 'Authorization': `token ${this.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }; }
  async getAll() {
    const r = await fetch(`${this.base}/issues?labels=visitor-log&state=all&per_page=30`, { headers: this.headers() });
    if (!r.ok) throw new Error('读取失败');
    const issues = await r.json();
    const all = [];
    for (const issue of issues) {
      const cr = await fetch(`${this.base}/issues/${issue.number}/comments?per_page=100`, { headers: this.headers() });
      if (!cr.ok) continue;
      const comments = await cr.json();
      comments.forEach(c => {
        const lines = c.body.split('\n').filter(l => l.startsWith('|') && !l.includes('---'));
        lines.slice(1).forEach(line => {
          const cols = line.split('|').map(c => c.trim()).filter(Boolean);
          if (cols.length >= 5) all.push({ time: cols[0], ip: cols[1], country: cols[2], region: cols[3], city: cols[4], ua: cols[5] || '', page: cols[6] || '' });
        });
      });
    }
    return all.reverse();
  }
}
</script>
</body>
</html>
