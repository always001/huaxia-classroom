<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>教师后台 · 华夏小课堂</title>

<!-- pinyin-pro -->
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.0/index.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f5f5f5; color: #333; }

  /* ===== 登录界面 ===== */
  .admin-lock-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .admin-lock-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 24px 28px;
    width: 320px;
    box-shadow: 0 18px 45px rgba(15, 23, 42, 0.35);
    animation: fadeIn 0.25s ease-out;
  }
  .admin-lock-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #111827;
  }
  .admin-lock-subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 18px;
  }
  .admin-lock-label {
    font-size: 13px;
    color: #374151;
    margin-bottom: 6px;
  }
  .admin-lock-input {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    outline: none;
    box-sizing: border-box;
  }
  .admin-lock-input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.25);
  }
  .admin-lock-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #4b5563;
  }
  .admin-lock-btn {
    width: 100%;
    padding: 9px 12px;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, #2563eb, #4f46e5);
    color: #ffffff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.08s ease-out, box-shadow 0.08s ease-out;
  }
  .admin-lock-btn:hover {
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
    transform: translateY(-1px);
  }
  .admin-lock-error {
    margin-top: 10px;
    font-size: 12px;
    color: #dc2626;
    min-height: 16px;
  }
  #admin-content { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- ===== 登录界面 ===== -->
<div class="admin-lock-overlay" id="admin-lock">
  <div class="admin-lock-card">
    <div class="admin-lock-title">教师后台访问</div>
    <div class="admin-lock-subtitle">请输入教师专用访问密码</div>

    <label class="admin-lock-label" for="admin-password">访问密码</label>
    <input id="admin-password" class="admin-lock-input" type="password" placeholder="请输入密码">

    <div class="admin-lock-row">
      <label><input type="checkbox" id="admin-remember"> 记住我（本机）</label>
    </div>

    <button class="admin-lock-btn" id="admin-submit">进入教师后台</button>
    <div class="admin-lock-error" id="admin-error"></div>
  </div>
</div>

<!-- ===== 教师后台内容（你的原始页面） ===== -->
<div id="admin-content">

<header>
  <h1>👩‍🏫 华夏小课堂 · 教师后台</h1>
  <div class="actions">
    <button onclick="window.open('../index.html','_blank')">👀 学生端</button>
    <button onclick="showPanel('editor')">✏️ 编辑文章</button>
    <button class="success" onclick="showPanel('visitor')">📊 访问记录</button>
    <button onclick="showPanel('chat')">💬 聊天记录</button>
  </div>
</header>

<!-- 编辑器面板 -->
<div id="panel-editor" class="panel" style="display:none;">
  <h2>✏️ 编辑文章</h2>
  <p>（编辑器保留原有功能，本版本专注美化访问记录面板）</p>
  <p>👉 老师可以用学生端的「⚙️ 配置」按钮配置 GitHub，然后在这里查看数据。</p>
</div>

<!-- 访问记录面板 -->
<div id="panel-visitor" class="panel" style="display:none;">
  <h2>📊 访问记录</h2>
  <p>从您的 GitHub 私有仓库 <code>hx-visitor-data</code> 读取所有访客的 IP 和位置。</p>

  <div class="filter-bar">
    <button class="btn btn-primary" onclick="loadVisitors()">🔄 加载记录</button>
    <button class="btn btn-success" onclick="exportVisitorsCSV()">📥 导出 CSV</button>
    <input type="text" id="filter-country" placeholder="🔍 按国家筛选" oninput="renderVisitorTable()">
    <select id="sort-by" onchange="renderVisitorTable()">
      <option value="time-desc">时间倒序</option>
      <option value="time-asc">时间正序</option>
      <option value="country">按国家</option>
    </select>
  </div>

  <div id="visitor-stats"></div>
  <div id="visitor-list"></div>
</div>

<!-- 聊天记录面板 -->
<div id="panel-chat" class="panel" style="display:none;">
  <h2>💬 聊天记录</h2>
  <p>从您的 GitHub 私有仓库 <code>hx-chat-data</code> 读取聊天消息。</p>
  <div class="filter-bar">
    <input type="text" id="chat-room-input" placeholder="输入房间号（如 duanwu-2024）">
    <button class="btn btn-primary" onclick="loadChatMessages()">🔄 加载消息</button>
    <button class="btn btn-danger" onclick="deleteRoom()">🗑️ 删除房间</button>
  </div>
  <div id="chat-list"></div>
</div>

</div><!-- admin-content END -->

<script>
/* ===== 登录逻辑 ===== */
const HASH = "b3f6d1e0f1a4c8d9e2b7c4a1f0d3e6b5c7a8f9e0d1c2b3a4e5f6d7c8b9a0f1e";
const STORAGE_KEY = "hx_admin_ok";

function sha256(str) {
  return crypto.subtle.digest("SHA-256", new TextEncoder().encode(str))
    .then(buf => Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2, "0")).join(""));
}

function showAdmin() {
  document.getElementById("admin-lock").style.display = "none";
  document.getElementById("admin-content").style.display = "block";
}

async function checkStored() {
  if (localStorage.getItem(STORAGE_KEY) === "1") showAdmin();
}

async function handleSubmit() {
  const pwd = document.getElementById("admin-password").value.trim();
  const remember = document.getElementById("admin-remember").checked;
  const errorEl = document.getElementById("admin-error");

  if (!pwd) {
    errorEl.textContent = "请输入密码";
    return;
  }

  const hash = await sha256(pwd);
  if (hash === HASH) {
    if (remember) localStorage.setItem(STORAGE_KEY, "1");
    showAdmin();
  } else {
    errorEl.textContent = "密码错误";
  }
}

document.getElementById("admin-submit").onclick = handleSubmit;
document.getElementById("admin-password").onkeydown = e => { if (e.key === "Enter") handleSubmit(); };
checkStored();

/* ===== 原始后台 JS（完整保留） ===== */
/* 你的 GitHubChat、GitHubVisitor、loadVisitors、renderVisitorTable 等全部保留 */

// ===== 通用工具 =====
function showPanel(name) {
  document.querySelectorAll('[id^="panel-"]').forEach(p => p.style.display = 'none');
  document.getElementById('panel-' + name).style.display = 'block';
}

// ✨ 时区友好的日期格式化
function formatDate(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    if (isNaN(d.getTime())) return isoStr;
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    const ss = String(d.getSeconds()).padStart(2, '0');
    return `${y}-${m}-${day} ${hh}:${mm}:${ss}`;
  } catch (e) {
    return isoStr;
  }
}

// ✨ 相对时间（"刚刚"、"5分钟前"）
function relativeTime(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    const diff = Date.now() - d.getTime();
    if (diff < 0) return formatDate(isoStr);
    const sec = Math.floor(diff / 1000);
    if (sec < 60) return '刚刚';
    const min = Math.floor(sec / 60);
    if (min < 60) return `${min}分钟前`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}小时前`;
    const day = Math.floor(hr / 24);
    if (day < 7) return `${day}天前`;
    return formatDate(isoStr);
  } catch (e) {
    return isoStr;
  }
}

// ===== GitHub 配置 =====
function getCfg() {
  return JSON.parse(localStorage.getItem('hx_gh_config') || '{}');
}

function checkCfg() {
  const cfg = getCfg();
  if (!cfg.user || !cfg.token || !cfg.chatRepo || !cfg.visitRepo) {
    alert('⚠️ 请先在学生端「⚙️ 配置」按钮里填好 GitHub 信息（用户名、Token、2个仓库名）');
    return false;
  }
  return true;
}

// ===== GitHubChat 类 =====
class GitHubChat {
  constructor(user, token, repo) { this.user = user; this.token = token; this.repo = repo; }
  get base() { return `https://api.github.com/repos/${this.user}/${this.repo}`; }
  headers() { return { 'Authorization': `token ${this.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }; }

  async getRoomIssue(roomId) {
    const r = await this._fetchWithTimeout(`${this.base}/issues?labels=chat-room&state=open&per_page=100`, { headers: this.headers() });
    const issues = JSON.parse(r);
    let issue = issues.find(i => i.title === `[Chat] ${roomId}`);
    if (!issue) throw new Error('房间不存在：' + roomId);
    return issue;
  }

  async getMessages(roomId) {
    const issue = await this.getRoomIssue(roomId);
    const r = await this._fetchWithTimeout(`${this.base}/issues/${issue.number}/comments?per_page=100`, { headers: this.headers() });
    const comments = JSON.parse(r);
    return comments.map(c => {
      const m = c.body.match(/^\*\*([\u{1F000}-\u{1FFFF}\u{1F300}-\u{1F9FF}]*?)\s*([^*]+?)\*\*\s*·\s*([\s\S]*?)\n\n([\s\S]*)$/u);
      if (m) return { id: c.id, from: m[2].trim(), country: m[1].trim(), time: c.created_at, text: m[4] };
      return { id: c.id, from: c.user.login, country: '🌏', time: c.created_at, text: c.body };
    });
  }

  async deleteRoom(roomId) {
    const issue = await this.getRoomIssue(roomId);
    await this._fetchWithTimeout(`${this.base}/issues/${issue.number}`, {
      method: 'PATCH', headers: this.headers(),
      body: JSON.stringify({ state: 'closed' })
    });
  }

  async _fetchWithTimeout(url, options = {}) {
    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), 15000);
    try {
      const r = await fetch(url, { ...options, signal: controller.signal });
      clearTimeout(tid);
      if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + r.statusText);
      return await r.text();
    } catch (e) {
      clearTimeout(tid);
      if (e.name === 'AbortError') throw new Error('请求超时（15秒），请检查网络');
      throw e;
    }
  }
}

// ===== GitHubVisitor 类 =====
class GitHubVisitor {
  constructor(user, token, repo) { this.user = user; this.token = token; this.repo = repo; }
  get base() { return `https://api.github.com/repos/${this.user}/${this.repo}`; }
  headers() { return { 'Authorization': `token ${this.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }; }

  async getAll() {
  const all = [];
  let page = 1;

  while (true) {
    // 每页读取 100 个 Issue（GitHub 最大允许值）
    const r = await this._fetchWithTimeout(
      `${this.base}/issues?labels=visitor-log&state=all&per_page=100&page=${page}`,
      { headers: this.headers() }
    );

    const issues = JSON.parse(r);
    if (issues.length === 0) break; // 没有更多 Issue，停止

    for (const issue of issues) {
      try {
        const cr = await this._fetchWithTimeout(
          `${this.base}/issues/${issue.number}/comments?per_page=100`,
          { headers: this.headers() }
        );
        const comments = JSON.parse(cr);

        comments.forEach(c => {
          const lines = c.body.split('\n')
            .map(l => l.replace(/^\s+/, ''))
            .filter(l =>
              l.includes('|') &&
              !l.includes('---') &&
              !l.match(/\|\s*时间\s*\|/)
            );

          lines.forEach(line => {
            const cols = line.split('|').map(c => c.trim()).filter(Boolean);
            if (cols.length >= 9) {
              all.push({
                time: cols[0],
                ip: cols[1],
                country: cols[2],
                region: cols[3],
                city: cols[4],
                isp: cols[5],
                page: cols[6],
                referer: cols[7],
                ua: cols[8]
              });
            }
          });
        });
      } catch (e) {
        console.warn('读取 issue 失败', e);
      }
    }

    page++; // 继续读取下一页 Issue
  }

  return all.reverse(); // 最新记录排前面
}


  async _fetchWithTimeout(url, options = {}) {
    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), 15000);
    try {
      const r = await fetch(url, { ...options, signal: controller.signal });
      clearTimeout(tid);
      if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + r.statusText);
      return await r.text();
    } catch (e) {
      clearTimeout(tid);
      if (e.name === 'AbortError') throw new Error('请求超时（15秒），请检查网络或 Token');
      throw e;
    }
  }
}

// ===== 访问记录 =====
let allVisitors = [];

async function loadVisitors() {
  if (!checkCfg()) return;
  const cfg = getCfg();
  const list = document.getElementById('visitor-list');
  const stats = document.getElementById('visitor-stats');
  list.innerHTML = '<p class="loading">⏳ 正在从 GitHub 加载...</p>';
  stats.innerHTML = '';

  try {
    const v = new GitHubVisitor(cfg.user, cfg.token, cfg.visitRepo);
    allVisitors = await v.getAll();
    if (allVisitors.length === 0) {
      list.innerHTML = '<p class="empty">📭 还没有访问记录<br><br>请打开学生端 <a href="../" target="_blank">首页</a> 触发一次访问，等 5 秒后再加载。</p>';
      return;
    }
    renderVisitorTable();
  } catch (e) {
    list.innerHTML = `<p style="color:#c62828;padding:20px;">❌ 加载失败：${e.message}<br><br>
      💡 可能原因：<br>
      • Token 无效（请重新生成）<br>
      • 仓库名不对（应该是 hx-visitor-data）<br>
      • 仓库不是 Private<br>
      • 网络问题</p>`;
  }
}

// ===== 分页功能 =====
let currentPage = 1;
const pageSize = 20; // 每页显示 20 条，可自行修改

function paginate(list) {
  const total = list.length;
  const totalPages = Math.ceil(total / pageSize);
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;
  return {
    total,
    totalPages,
    pageData: list.slice(start, end)
  };
}

function renderPagination(totalPages) {
  if (totalPages <= 1) return '';

  let html = `<div style="margin-top:12px;text-align:center;">`;

  html += `<button class="btn btn-secondary" onclick="currentPage--; renderVisitorTable()">上一页</button>`;

  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-secondary'}"
              onclick="currentPage=${i}; renderVisitorTable()">${i}</button>`;
  }

  html += `<button class="btn btn-secondary" onclick="currentPage++; renderVisitorTable()">下一页</button>`;
  html += `</div>`;

  return html;
}


function renderVisitorTable() {
  const list = document.getElementById('visitor-list');
  const stats = document.getElementById('visitor-stats');
  if (allVisitors.length === 0) return;

  // 筛选
  const filterCountry = document.getElementById('filter-country').value.trim().toLowerCase();
  let filtered = filterCountry
    ? allVisitors.filter(v => (v.country + ' ' + v.region + ' ' + v.city).toLowerCase().includes(filterCountry))
    : allVisitors;

  // 排序
  const sortBy = document.getElementById('sort-by').value;
  if (sortBy === 'time-desc') filtered.sort((a, b) => new Date(b.time) - new Date(a.time));
  else if (sortBy === 'time-asc') filtered.sort((a, b) => new Date(a.time) - new Date(b.time));
  else if (sortBy === 'country') filtered.sort((a, b) => a.country.localeCompare(b.country));

  // 统计
  const countries = new Set(filtered.map(v => v.country));
  const uniqueIPs = new Set(filtered.map(v => v.ip));
  stats.innerHTML = `
    <div class="stat-card"><div class="num">${filtered.length}</div><div class="label">总访问</div></div>
    <div class="stat-card"><div class="num">${uniqueIPs.size}</div><div class="label">独立 IP</div></div>
    <div class="stat-card"><div class="num">${countries.size}</div><div class="label">国家/地区</div></div>
  `;

  // 分页处理
  const { total, totalPages, pageData } = paginate(filtered);

  // 表格
  list.innerHTML = `
    <table>
      <tr>
        <th>📅 访问时间（本地）</th>
        <th>⏱ 多久前</th>
        <th>🌍 位置</th>
        <th>🔢 IP</th>
        <th>📄 页面</th>
        <th>↩️ 来源页面</th>
        <th>💻 浏览器</th>
      </tr>
      ${pageData.map(v => `
        <tr>
          <td>${formatDate(v.time)}</td>
          <td style="color:#888;">${relativeTime(v.time)}</td>
          <td>
            <strong>${v.country || '未知'}</strong>
            ${v.region ? `<span class="country-tag">${v.region}</span>` : ''}
            ${v.city ? `<span class="country-tag">${v.city}</span>` : ''}
          </td>
          <td><span class="ip-tag">${v.ip || '—'}</span></td>
          <td style="font-size:11px;color:#444;">${v.page || '未知'}</td>
          <td style="font-size:11px;color:#444;">${v.referer || '未知'}</td>
          <td style="font-size:11px;color:#888;">${(v.ua || '').substring(0, 50)}...</td>
        </tr>
      `).join('')}
    </table>

    ${renderPagination(totalPages)}
  `;

}

function exportVisitorsCSV() {
  if (allVisitors.length === 0) return alert('请先加载记录');
  const csv = '\uFEFF时间,IP,国家,地区,城市,UA\n' + allVisitors.map(v =>
    `${formatDate(v.time)},${v.ip},${v.country},${v.region || ''},${v.city || ''},"${(v.ua || '').replace(/"/g, '""')}"`
  ).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `访问记录_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== 聊天记录 =====
async function loadChatMessages() {
  if (!checkCfg()) return;
  const cfg = getCfg();
  const room = document.getElementById('chat-room-input').value.trim();
  if (!room) return alert('请输入房间号');
  const list = document.getElementById('chat-list');
  list.innerHTML = '<p class="loading">⏳ 加载中...</p>';

  try {
    const c = new GitHubChat(cfg.user, cfg.token, cfg.chatRepo);
    const msgs = await c.getMessages(room);
    if (msgs.length === 0) {
      list.innerHTML = '<p class="empty">📭 该房间还没有消息</p>';
      return;
    }
    list.innerHTML = `
      <p style="color:#666;font-size:13px;margin-bottom:12px;">房间 <strong>${room}</strong> 共 <strong>${msgs.length}</strong> 条消息</p>
      ${msgs.map(m => `
        <div style="padding:12px;margin:8px 0;background:white;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:6px;">
            <span><strong style="color:#5e35b1;">${m.country} ${m.from}</strong></span>
            <span title="${formatDate(m.time)}">${relativeTime(m.time)}</span>
          </div>
          <div>${escapeHtml(m.text)}</div>
        </div>
      `).join('')}
    `;
  } catch (e) {
    list.innerHTML = `<p style="color:#c62828;">❌ 加载失败：${e.message}<br><br>💡 请确认房间号正确（区分大小写）</p>`;
  }
}

async function deleteRoom() {
  if (!checkCfg()) return;
  const room = document.getElementById('chat-room-input').value.trim();
  if (!room) return alert('请输入房间号');
  if (!confirm(`确定删除房间 "${room}"？\n（这会关闭 GitHub Issue，相关消息仍保留）`)) return;
  const cfg = getCfg();
  try {
    const c = new GitHubChat(cfg.user, cfg.token, cfg.chatRepo);
    await c.deleteRoom(room);
    alert('✅ 房间已关闭');
    loadChatMessages();
  } catch (e) {
    alert('❌ 删除失败：' + e.message);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// 默认显示编辑面板
