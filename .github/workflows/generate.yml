name: Generate Content

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"   # 每天 00:00 自动生成

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run generator
        run: node ai-generator.js --batch topics.txt --category festivals --grade 2

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto-generate content" || echo "No changes"
          git push
