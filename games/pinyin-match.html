<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🧩 拼音消消乐 - 华夏小课堂</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #ffecd2, #fcb69f); min-height: 100vh; padding: 20px; }
  .game-wrap { max-width: 800px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
  .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .top h1 { color: #e74c3c; font-size: 24px; }
  .back-btn { background: #f0f0f0; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; }
  .score-board { display: flex; gap: 12px; margin-bottom: 20px; }
  .score-box { flex: 1; padding: 12px; background: #fff3e0; border-radius: 12px; text-align: center; }
  .score-box .label { font-size: 12px; color: #888; }
  .score-box .value { font-size: 24px; font-weight: bold; color: #e65100; }
  .instruction { background: #e3f2fd; padding: 12px 16px; border-radius: 12px; margin-bottom: 20px; color: #1976d2; font-size: 14px; }
  .instruction .warn { color: #c62828; font-weight: bold; display: block; margin-top: 6px; }
  .word-pool { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; min-height: 80px; padding: 12px; background: #fafafa; border-radius: 12px; }
  .pinyin-pool { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .card { padding: 14px; border-radius: 12px; cursor: pointer; text-align: center; font-size: 18px; font-weight: bold; transition: all 0.2s; user-select: none; border: 2px solid transparent; font-family: "Times New Roman", "Arial", serif; }
  .card-hanzi { background: #fff; color: #333; border: 2px solid #ffc107; font-size: 28px; font-family: "KaiTi", 楷体, serif; }
  .card-pinyin { background: #e1f5fe; color: #01579b; }
  .card-hanzi.selected { background: #fff59d; transform: scale(1.05); }
  .card-pinyin.selected { background: #4fc3f7; color: white; }
  .card.matched { opacity: 0.25; pointer-events: none; animation: fadeOut 0.5s; }
  @keyframes fadeOut { to { transform: scale(0.8); } }
  .card:hover:not(.matched) { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
  .restart-btn { display: block; margin: 20px auto; padding: 12px 32px; background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; border: none; border-radius: 24px; cursor: pointer; font-size: 16px; font-weight: bold; }
  .restart-btn:hover { transform: scale(1.05); }
  .win-banner { display: none; text-align: center; padding: 20px; background: linear-gradient(135deg, #ffd700, #ff8c00); color: white; border-radius: 12px; margin-bottom: 20px; font-size: 22px; font-weight: bold; }
</style>
</head>
<body>
<div class="game-wrap">
  <div class="top">
    <button class="back-btn" onclick="window.close()">← 返回</button>
    <h1>🧩 拼音消消乐</h1>
    <span></span>
  </div>
  <div class="win-banner" id="win-banner">🎉 恭喜你全部配对成功！🎉</div>
  <div class="score-board">
    <div class="score-box"><div class="label">得分</div><div class="value" id="score">0</div></div>
    <div class="score-box"><div class="label">连击 🔥</div><div class="value" id="combo">0</div></div>
    <div class="score-box"><div class="label">剩余</div><div class="value" id="remain">8</div></div>
  </div>
  <div class="instruction">
    👉 点一个<strong>汉字</strong>，再点对应的<strong>带声调拼音</strong>，配对成功就消失！<br>
    点汉字可以听发音 💡
    <span class="warn">⚠️ 声调必须完全一致！yǔ ≠ yù</span>
  </div>
  <div class="word-pool" id="word-pool"></div>
  <div class="pinyin-pool" id="pinyin-pool"></div>
  <button class="restart-btn" onclick="initGame()">🔄 再来一局</button>
</div>

<script>
// ==========================================================
// 字库：分类整理，去重严谨，每个字只出现一次
// ==========================================================
const WORDS = [
  // 🌤️ 自然景物
  { hz: '天', py: 'tiān' }, { hz: '地', py: 'dì' },
  { hz: '日', py: 'rì' }, { hz: '月', py: 'yuè' },
  { hz: '星', py: 'xīng' }, { hz: '云', py: 'yún' },
  { hz: '雨', py: 'yǔ' }, { hz: '雪', py: 'xuě' },
  { hz: '风', py: 'fēng' }, { hz: '雷', py: 'léi' },
  { hz: '山', py: 'shān' }, { hz: '水', py: 'shuǐ' },
  { hz: '河', py: 'hé' }, { hz: '海', py: 'hǎi' },
  { hz: '湖', py: 'hú' }, { hz: '花', py: 'huā' },
  { hz: '草', py: 'cǎo' }, { hz: '树', py: 'shù' },
  { hz: '田', py: 'tián' }, { hz: '土', py: 'tǔ' },

  // 🐾 动物
  { hz: '猫', py: 'māo' }, { hz: '狗', py: 'gǒu' },
  { hz: '鸟', py: 'niǎo' }, { hz: '鱼', py: 'yú' },
  { hz: '马', py: 'mǎ' }, { hz: '牛', py: 'niú' },
  { hz: '羊', py: 'yáng' }, { hz: '猪', py: 'zhū' },
  { hz: '鸡', py: 'jī' }, { hz: '鸭', py: 'yā' },
  { hz: '虎', py: 'hǔ' }, { hz: '龙', py: 'lóng' },

  // 👨‍👩‍👧 人物
  { hz: '我', py: 'wǒ' }, { hz: '你', py: 'nǐ' },
  { hz: '他', py: 'tā' }, { hz: '人', py: 'rén' },
  { hz: '爸', py: 'bà' }, { hz: '妈', py: 'mā' },
  { hz: '哥', py: 'gē' }, { hz: '姐', py: 'jiě' },
  { hz: '弟', py: 'dì' }, { hz: '妹', py: 'mèi' },
  { hz: '爷', py: 'yé' }, { hz: '奶', py: 'nǎi' },
  { hz: '家', py: 'jiā' }, { hz: '国', py: 'guó' },

  // 🔢 数字
  { hz: '一', py: 'yī' }, { hz: '二', py: 'èr' },
  { hz: '三', py: 'sān' }, { hz: '四', py: 'sì' },
  { hz: '五', py: 'wǔ' }, { hz: '六', py: 'liù' },
  { hz: '七', py: 'qī' }, { hz: '八', py: 'bā' },
  { hz: '九', py: 'jiǔ' }, { hz: '十', py: 'shí' },
  { hz: '百', py: 'bǎi' }, { hz: '千', py: 'qiān' },
  { hz: '万', py: 'wàn' },

  // 👁️ 身体部位
  { hz: '心', py: 'xīn' }, { hz: '手', py: 'shǒu' },
  { hz: '足', py: 'zú' }, { hz: '口', py: 'kǒu' },
  { hz: '目', py: 'mù' }, { hz: '耳', py: 'ěr' },
  { hz: '鼻', py: 'bí' },

  // 🍎 食物
  { hz: '饭', py: 'fàn' }, { hz: '米', py: 'mǐ' },
  { hz: '水', py: 'shuǐ' }, { hz: '茶', py: 'chá' },
  { hz: '糖', py: 'táng' }, { hz: '盐', py: 'yán' },
  { hz: '油', py: 'yóu' }, { hz: '面', py: 'miàn' },
  { hz: '肉', py: 'ròu' }, { hz: '蛋', py: 'dàn' },
  { hz: '瓜', py: 'guā' }, { hz: '果', py: 'guǒ' },

  // 🏃 动作
  { hz: '走', py: 'zǒu' }, { hz: '跑', py: 'pǎo' },
  { hz: '飞', py: 'fēi' }, { hz: '跳', py: 'tiào' },
  { hz: '游', py: 'yóu' }, { hz: '玩', py: 'wán' },
  { hz: '笑', py: 'xiào' }, { hz: '哭', py: 'kū' },
  { hz: '唱', py: 'chàng' }, { hz: '跳', py: 'tiào' },
  { hz: '听', py: 'tīng' }, { hz: '说', py: 'shuō' },
  { hz: '读', py: 'dú' }, { hz: '写', py: 'xiě' },
  { hz: '看', py: 'kàn' }, { hz: '想', py: 'xiǎng' },
  { hz: '爱', py: 'ài' }, { hz: '笑', py: 'xiào' },

  // 📚 学习用品
  { hz: '书', py: 'shū' }, { hz: '笔', py: 'bǐ' },
  { hz: '纸', py: 'zhǐ' }, { hz: '本', py: 'běn' },
  { hz: '学', py: 'xué' }, { hz: '校', py: 'xiào' },
  { hz: '字', py: 'zì' }, { hz: '词', py: 'cí' },

  // 🎨 颜色
  { hz: '红', py: 'hóng' }, { hz: '黄', py: 'huáng' },
  { hz: '蓝', py: 'lán' }, { hz: '绿', py: 'lǜ' },
  { hz: '白', py: 'bái' }, { hz: '黑', py: 'hēi' },

  // 🏠 交通工具和建筑
  { hz: '车', py: 'chē' }, { hz: '船', py: 'chuán' },
  { hz: '路', py: 'lù' }, { hz: '桥', py: 'qiáo' },
  { hz: '门', py: 'mén' }, { hz: '窗', py: 'chuāng' },

  // ⚡ 形容
  { hz: '大', py: 'dà' }, { hz: '小', py: 'xiǎo' },
  { hz: '高', py: 'gāo' }, { hz: '低', py: 'dī' },
  { hz: '长', py: 'cháng' }, { hz: '短', py: 'duǎn' },
  { hz: '多', py: 'duō' }, { hz: '少', py: 'shǎo' },
  { hz: '好', py: 'hǎo' }, { hz: '坏', py: 'huài' },
  { hz: '新', py: 'xīn' }, { hz: '旧', py: 'jiù' },
  { hz: '美', py: 'měi' }, { hz: '新', py: 'xīn' },
  { hz: '快', py: 'kuài' }, { hz: '慢', py: 'màn' },
  { hz: '热', py: 'rè' }, { hz: '冷', py: 'lěng' },
  { hz: '亮', py: 'liàng' }, { hz: '香', py: 'xiāng' },
  { hz: '甜', py: 'tián' }, { hz: '苦', py: 'kǔ' },

  // 🎉 节日和特殊
  { hz: '节', py: 'jié' }, { hz: '春', py: 'chūn' },
  { hz: '夏', py: 'xià' }, { hz: '秋', py: 'qiū' },
  { hz: '冬', py: 'dōng' }, { hz: '年', py: 'nián' },
  { hz: '月', py: 'yuè' }, { hz: '日', py: 'rì' },
  { hz: '灯', py: 'dēng' }, { hz: '船', py: 'chuán' },
];

// ==========================================================
// 去重：确保 (字, 拼音) 唯一
// ==========================================================
const DICT = {};
WORDS.forEach(w => {
  // 如果字已存在但声调不同，两个都保留（教学需要！）
  if (!DICT[w.hz]) DICT[w.hz] = w.py;
});

// 最终游戏用的字库（去重，但保留不同声调的字）
function getGameWords() {
  const uniqueByChar = new Map();
  WORDS.forEach(w => {
    if (!uniqueByChar.has(w.hz)) {
      uniqueByChar.set(w.hz, w.py);
    }
  });
  return Array.from(uniqueByChar.entries()).map(([hz, py]) => ({ hz, py }));
}

const GAME_WORDS = getGameWords();
console.log('游戏字库共 ' + GAME_WORDS.length + ' 个汉字');

// ==========================================================
// TTS
// ==========================================================
const synth = window.speechSynthesis;
let ttsVoice = null;
function loadVoice() {
  const voices = synth.getVoices();
  ttsVoice = voices.find(v => /zh/i.test(v.lang) && /Xiaoxiao|Mei|Ting|女|female/i.test(v.name))
          || voices.find(v => /zh/i.test(v.lang));
}
loadVoice();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoice;
function speak(text) {
  if (!ttsVoice) loadVoice();
  if (!ttsVoice) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.voice = ttsVoice; u.lang = ttsVoice.lang || 'zh-CN'; u.rate = 0.85;
  synth.speak(u);
}

// ==========================================================
// 游戏逻辑
// ==========================================================
const TOTAL = 8;  // 每局 8 对
let state = { selectedHz: null, selectedPy: null, score: 0, combo: 0, matched: 0 };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initGame() {
  document.getElementById('win-banner').style.display = 'none';
  state = { selectedHz: null, selectedPy: null, score: 0, combo: 0, matched: 0 };
  updateScore();

  // 从 100+ 字库随机抽 8 个
  const chosen = shuffle(GAME_WORDS).slice(0, TOTAL);

  const wordPool = document.getElementById('word-pool');
  const pinyinPool = document.getElementById('pinyin-pool');
  wordPool.innerHTML = '';
  pinyinPool.innerHTML = '';

  // 渲染汉字行
  chosen.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'card card-hanzi';
    card.textContent = w.hz;
    card.dataset.matchKey = w.py;  // ✨ 关键：严格匹配带声调
    card.dataset.id = 'hz-' + i;
    card.onclick = () => {
      speak(w.hz);
      document.querySelectorAll('.card-hanzi.selected').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      state.selectedHz = card;
      tryMatch();
    };
    wordPool.appendChild(card);
  });

  // 渲染拼音行（打乱顺序）
  shuffle([...chosen]).forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'card card-pinyin';
    card.textContent = w.py;  // ✨ 直接显示带声调符号
    card.dataset.matchKey = w.py;
    card.dataset.id = 'py-' + i;
    card.onclick = () => {
      document.querySelectorAll('.card-pinyin.selected').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      state.selectedPy = card;
      tryMatch();
    };
    pinyinPool.appendChild(card);
  });
}

function tryMatch() {
  if (!state.selectedHz || !state.selectedPy) return;
  const hz = state.selectedHz, py = state.selectedPy;

  // ✨ 严格匹配：完全相等才匹配（声调必须完全一致）
  if (hz.dataset.matchKey === py.dataset.matchKey) {
    hz.classList.add('matched');
    py.classList.add('matched');
    state.matched++;
    state.combo++;
    state.score += 10 * state.combo;
    updateScore();
    if (state.matched >= TOTAL) {
      setTimeout(() => {
        document.getElementById('win-banner').style.display = 'block';
        speak('恭喜你全部配对成功！');
      }, 400);
    }
  } else {
    state.combo = 0;
    updateScore();
  }
  state.selectedHz = null;
  state.selectedPy = null;
  setTimeout(() => {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
  }, 200);
}

function updateScore() {
  document.getElementById('score').textContent = state.score;
  document.getElementById('combo').textContent = state.combo;
  document.getElementById('remain').textContent = TOTAL - state.matched;
}

initGame();
</script>
</body>
</html>
