<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>🧩 拼音消消乐 - 华夏小课堂</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    min-height: 100vh;
    padding: 20px;
  }
  .game-wrap {
    max-width: 800px; margin: 0 auto; background: white;
    border-radius: 24px; padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }
  .top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .top h1 { color: #e74c3c; font-size: 24px; }
  .back-btn {
    background: #f0f0f0; border: none; padding: 8px 16px;
    border-radius: 20px; cursor: pointer; font-size: 14px;
  }
  .score-board {
    display: flex; gap: 12px; margin-bottom: 20px;
  }
  .score-box {
    flex: 1; padding: 12px; background: #fff3e0;
    border-radius: 12px; text-align: center;
  }
  .score-box .label { font-size: 12px; color: #888; }
  .score-box .value { font-size: 24px; font-weight: bold; color: #e65100; }

  .instruction {
    background: #e3f2fd; padding: 12px 16px; border-radius: 12px;
    margin-bottom: 20px; color: #1976d2; font-size: 14px;
  }

  .word-pool {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
    min-height: 80px; padding: 12px; background: #fafafa;
    border-radius: 12px;
  }
  .pinyin-pool {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px; margin-bottom: 24px;
  }
  .card {
    padding: 14px; border-radius: 12px; cursor: pointer;
    text-align: center; font-size: 18px; font-weight: bold;
    transition: all 0.2s; user-select: none;
    border: 2px solid transparent;
  }
  .card-hanzi {
    background: #fff; color: #333; border: 2px solid #ffc107;
    font-size: 28px; font-family: 楷体;
  }
  .card-pinyin {
    background: #e1f5fe; color: #01579b;
  }
  .card-hanzi.selected { background: #fff59d; transform: scale(1.05); }
  .card-pinyin.selected { background: #4fc3f7; color: white; }
  .card.matched { opacity: 0.3; pointer-events: none; animation: fadeOut 0.5s; }
  @keyframes fadeOut { to { transform: scale(0.8); } }
  .card:hover:not(.matched) { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }

  .restart-btn {
    display: block; margin: 20px auto; padding: 12px 32px;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white; border: none; border-radius: 24px;
    cursor: pointer; font-size: 16px; font-weight: bold;
  }
  .restart-btn:hover { transform: scale(1.05); }

  .win-banner {
    display: none; text-align: center; padding: 20px;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: white; border-radius: 12px; margin-bottom: 20px;
    font-size: 22px; font-weight: bold;
  }
</style>

// 声调符号表
const TONE_MARKS = ['ā','á','ǎ','à','ō','ó','ǒ','ò','ē','é','ě','è','ī','í','ǐ','ì','ū','ú','ǔ','ù','ǖ','ǘ','ǚ','ǜ'];

// ✨ 关键修复：去除声调数字，得到纯净拼音
function stripTone(pinyin) {
  // 把 "jie2" 变成 "jie"，"yue4" 变成 "yue"
  return pinyin.replace(/[1-5]$/, '');
}

// ✨ 关键修复：把带声调数字的拼音转成带调符号（用于显示）
function toDisplayPinyin(pinyin) {
  const m = pinyin.match(/^([a-zA-ZüÜ]+)([1-5])?$/);
  if (!m) return pinyin;
  const base = m[1].toLowerCase();
  const tone = m[2] ? parseInt(m[2]) : 0;
  if (tone === 0 || tone === 5) return base;

  // 韵母优先级（长的优先）
  const finals = ['iang','uang','ueng','ai','ei','ui','ao','ou','iu','ie','ve','er','an','en','in','un','ün','ang','eng','ing','ong'];
  for (const f of finals) {
    if (base.includes(f)) {
      const idx = (tone - 1) * 2;
      const map = {
        'a': 'āáǎà','o':'ōóǒò','e':'ēéěè','i':'īíǐì','u':'ūúǔù','ü':'ǖǘǚǜ',
        'ai':'āi ái ǎi ài','ei':'ēi éi ěi èi','ui':'uī uí uǐ uì',
        'ao':'āo áo ǎo ào','ou':'ōu óu ǒu òu','iu':'iū iú iǔ iù',
        'ie':'iē ié iě iè','üe':'üē üé üě üè','er':'ēr ér ěr èr',
        'an':'ān án ǎn àn','en':'ēn én ěn èn','in':'īn ín ǐn ìn',
        'un':'ūn ún ǔn ùn','ün':'ǖn ǘn ǚn ǜn',
        'ang':'āng áng ǎng àng','eng':'ēng éng ěng èng',
        'ing':'īng íng ǐng ìng','ong':'ōng óng ǒng òng'
      };
      const tones = map[f];
      if (tones) {
        const parts = tones.split(' ');
        if (parts[tone - 1]) return base.replace(f, parts[tone - 1]);
      }
      // 简化版：用 Unicode 组合字符
      return base.replace(f, TONE_MARKS[(tone-1)*2 + 'aeiou'.indexOf(f[0])] || base);
    }
  }
  return base;
}

// ===== TTS =====
const synth = window.speechSynthesis;
let ttsVoice = null;
function loadVoice() {
  const voices = synth.getVoices();
  ttsVoice = voices.find(v => /zh/i.test(v.lang) && /Xiaoxiao|Mei|Ting|女|female/i.test(v.name))
          || voices.find(v => /zh/i.test(v.lang));
}
loadVoice();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoice;

function speak(text) {
  if (!ttsVoice) loadVoice();
  if (!ttsVoice) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.voice = ttsVoice; u.lang = ttsVoice.lang || 'zh-CN'; u.rate = 0.85;
  synth.speak(u);
}

// ===== 游戏状态 =====
let state = { selectedHz: null, selectedPy: null, score: 0, combo: 0, matched: 0 };
const TOTAL = 8;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initGame() {
  document.getElementById('win-banner').style.display = 'none';
  state = { selectedHz: null, selectedPy: null, score: 0, combo: 0, matched: 0 };
  updateScore();

  // ✨ 去重：用 Set 保证不重复（避免同一个字出现 2 次）
  const uniqueWords = [];
  const seen = new Set();
  for (const w of WORDS) {
    if (!seen.has(w.hz)) {
      seen.add(w.hz);
      uniqueWords.push(w);
    }
    if (uniqueWords.length >= 30) break; // 准备 30 个，从里面随机抽 8 个
  }
  const chosen = shuffle(uniqueWords).slice(0, TOTAL);

  const wordPool = document.getElementById('word-pool');
  const pinyinPool = document.getElementById('pinyin-pool');
  wordPool.innerHTML = '';
  pinyinPool.innerHTML = '';

  // 汉字行
  chosen.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'card card-hanzi';
    card.textContent = w.hz;
    // ✨ 关键：存"去声调数字"版本的拼音，用于匹配
    card.dataset.matchKey = stripTone(w.py);
    // ✨ 显示用：带声调符号的版本
    card.dataset.display = toDisplayPinyin(w.py);
    card.dataset.id = 'hz-' + i;
    card.onclick = () => {
      speak(w.hz);
      document.querySelectorAll('.card-hanzi.selected').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      state.selectedHz = card;
      tryMatch();
    };
    wordPool.appendChild(card);
  });

  // 拼音行（打乱顺序）
  const shuffledPinyin = shuffle([...chosen]);
  shuffledPinyin.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'card card-pinyin';
    card.textContent = toDisplayPinyin(w.py);
    card.dataset.matchKey = stripTone(w.py);
    card.dataset.id = 'py-' + i;
    card.onclick = () => {
      document.querySelectorAll('.card-pinyin.selected').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      state.selectedPy = card;
      tryMatch();
    };
    pinyinPool.appendChild(card);
  });
}

function tryMatch() {
  if (!state.selectedHz || !state.selectedPy) return;
  const hz = state.selectedHz, py = state.selectedPy;

  // ✨ 关键修复：用"去声调"的版本比较！
  // 「月」(yue4) 和「yuè」匹配：都变成 "yue"
  if (hz.dataset.matchKey === py.dataset.matchKey) {
    hz.classList.add('matched');
    py.classList.add('matched');
    state.matched++;
    state.combo++;
    state.score += 10 * state.combo;
    updateScore();
    if (state.matched >= TOTAL) {
      setTimeout(() => {
        document.getElementById('win-banner').style.display = 'block';
        speak('恭喜你全部配对成功！');
      }, 400);
    }
  } else {
    state.combo = 0;
    updateScore();
  }
  state.selectedHz = null;
  state.selectedPy = null;
  setTimeout(() => {
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
  }, 200);
}

function updateScore() {
  document.getElementById('score').textContent = state.score;
  document.getElementById('combo').textContent = state.combo;
  document.getElementById('remain').textContent = TOTAL - state.matched;
}

initGame();
