<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>访问记录测试</title></head>
<body>
<h1>访问记录测试</h1>
<div id="log" style="font-family:monospace;background:#000;color:#0f0;padding:20px;"></div>
<script>
// 100% 独立，不依赖任何外部文件
function log(msg, type) {
  const d = document.createElement('div');
  d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  d.style.color = type === 'err' ? '#f44' : type === 'ok' ? '#0f0' : '#ff0';
  document.getElementById('log').appendChild(d);
  console.log(msg);
}

async function main() {
  // 1. 配置
  //const cfg = JSON.parse(localStorage.getItem('hx_gh_config') || '{}');
  const cfg = {
    user: "always001",
    token: "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",
    visitRepo: "hx-visitor-data"
  };

  log('配置: user=' + cfg.user + ' token=' + (cfg.token ? cfg.token.length + '字符' : '空') + ' repo=' + cfg.visitRepo);

  if (!cfg.user || !cfg.token || !cfg.visitRepo) {
    //alert("请先访问 admin 页面设置访问记录配置");
    log('❌ 配置不全！', 'err');
    return;
  }

  // 2. IP
  log('获取 IP...');
  let loc = { ip: '未知', country: '未知', region: '', city: '' };
  try {
    const r = await fetch('https://ipwho.is/');
    const d = await r.json();
    if (d.ip) { loc = { ip: d.ip, country: d.country, region: d.region, city: d.city }; }
    log('IP: ' + loc.ip + ' / ' + loc.country, 'ok');
  } catch(e) {
    log('IP 获取失败: ' + e.message, 'err');
  }

  // 3. Issue
  const date = new Date().toISOString().slice(0,10);
  const title = '访客记录 ' + date;
  log('查找 Issue: ' + title);
  let issue;
  try {
    const r = await fetch('https://api.github.com/repos/' + cfg.user + '/' + cfg.visitRepo + '/issues?labels=visitor-log&state=open&per_page=10', {
      headers: { 'Authorization': 'token ' + cfg.token }
    });
    const issues = await r.json();
    issue = issues.find(i => i.title === title);
    if (issue) {
      log('找到 Issue: #' + issue.number, 'ok');
    } else {
      log('创建 Issue...');
      const cr = await fetch('https://api.github.com/repos/' + cfg.user + '/' + cfg.visitRepo + '/issues', {
        method: 'POST',
        headers: { 'Authorization': 'token ' + cfg.token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: title, body: '# ' + date, labels: ['visitor-log'] })
      });
      issue = await cr.json();
      log('创建 Issue 成功: #' + issue.number, 'ok');
    }
  } catch(e) {
    log('Issue 操作失败: ' + e.message, 'err');
    return;
  }

  // 4. 添加评论
  log('添加访问记录...');
  const now = new Date().toISOString();
  const body = '| ' + now + ' | ' + loc.ip + ' | ' + loc.country + ' | ' + (loc.region||'') + ' | ' + (loc.city||'') + ' | | ' + location.pathname + ' |';
  try {
    const r = await fetch('https://api.github.com/repos/' + cfg.user + '/' + cfg.visitRepo + '/issues/' + issue.number + '/comments', {
      method: 'POST',
      headers: { 'Authorization': 'token ' + cfg.token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ body: body })
    });
    if (r.ok) {
      log('🎉 访问记录上传成功！', 'ok');
    } else {
      log('❌ 上传失败: ' + r.status, 'err');
    }
  } catch(e) {
    log('❌ 上传异常: ' + e.message, 'err');
  }
}

main();
</script>
</body>
</html>
