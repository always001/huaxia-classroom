<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>访问记录测试</title></head>
<body>
<h1>访问记录测试（Vercel 后端版）</h1>
<div id="log" style="font-family:monospace;background:#000;color:#0f0;padding:20px;"></div>

<script>
// 简单日志输出
function log(msg, type) {
  const d = document.createElement('div');
  d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  d.style.color = type === 'err' ? '#f44' : type === 'ok' ? '#0f0' : '#ff0';
  document.getElementById('log').appendChild(d);
  console.log(msg);
}

async function main() {

  // 1. 获取 IP（你原来的逻辑保留）
  log('获取 IP...');
  let loc = { ip: '未知', country: '未知', region: '', city: '' };

  try {
    const r = await fetch('https://ipwho.is/');
    const d = await r.json();
    if (d.ip) {
      loc = {
        ip: d.ip,
        country: d.country,
        region: d.region,
        city: d.city
      };
    }
    log('IP: ' + loc.ip + ' / ' + loc.country, 'ok');
  } catch(e) {
    log('IP 获取失败: ' + e.message, 'err');
  }

  // 2. 调用 Vercel 后端 API（最关键的部分）
  log('上传访问记录到 Vercel 后端...');

  try {
    const r = await fetch("https://huaxia-classroom.vercel.app/api/log", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ip: loc.ip,
        country: loc.country,
        region: loc.region,
        city: loc.city,
        path: location.pathname
      })
    });

    if (r.ok) {
      log('🎉 访问记录上传成功！（由 Vercel 后端写入 GitHub Issues）', 'ok');
    } else {
      log('❌ 上传失败: HTTP ' + r.status, 'err');
    }

  } catch(e) {
    log('❌ 上传异常: ' + e.message, 'err');
  }
}

main();
</script>
</body>
</html>
